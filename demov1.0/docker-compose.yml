version: '3.8'

services:
  mysql:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: xiuxian123
      MYSQL_DATABASE: xiuxian_demo
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pxiuxian123"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  backend:
    build: ./server
    ports:
      - "9999:9999"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: xiuxian123
      DB_NAME: xiuxian_demo
      PORT: 9999
      AI_PROVIDER: deepseek
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: https://api.deepseek.com
      DEEPSEEK_MODEL: deepseek-chat

  frontend:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_TARGET: http://backend:9999

volumes:
  mysql_data:
